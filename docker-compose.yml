version: '3.8'

services:
  nyc-taxi-api:
    build: .
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - FLASK_ENV=production
    volumes:
      - ./nyc_taxi.db:/app/nyc_taxi.db
      - ./data:/app/data
    restart: unless-stopped
    
